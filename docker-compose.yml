services:
  db:
    image: postgres:15-alpine
    container_name: stylesync_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stylesync
      POSTGRES_USER: stylesync
      POSTGRES_PASSWORD: stylesync
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylesync -d stylesync"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stylesync_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stylesync:stylesync@db:5432/stylesync
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stylesync_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
